server:
  port: ${APP_PORT:8091}

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  config:
    import:
      - classpath:agent/drawio-fast.yml
      - classpath:agent/drawio-balanced.yml
      - classpath:agent/drawio-quality.yml
      - classpath:agent/drawio-stable.yml
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://127.0.0.1:3306/test?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  hikari:
    pool-name: Retail_HikariCP
    minimum-idle: 15 #最小空闲连接数量
    idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
    maximum-pool-size: 25 #连接池最大连接数，默认是10
    auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
    max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
    connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
    connection-test-query: SELECT 1
  type: com.zaxxer.hikari.HikariDataSource

# MyBatis 配置【如需使用记得打开】
#mybatis:
#  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location:  classpath:/mybatis/config/mybatis-config.xml

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

management:
  server:
    port: ${PROMETHEUS_PORT:9091}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

agent:
  plugin:
    observability:
      enabled: true
    governance:
      enabled: true
      user-rate-limit-per-second: 5
      user-concurrency-limit: 3
      default-user-quota-per-day: 1000
      blacklist: []
      breaker:
        enabled: false
        failure-threshold: 5
        open-seconds: 60
    privacy:
      enabled: true
      mask-phone: true
      mask-id-card: true
      mask-token: true
      replace-text: "***"
    cost:
      enabled: true
      model-pricing:
        "glm-4.7":
          input-per-1k: 0.003
          output-per-1k: 0.014