server:
  port: ${APP_PORT:8091}

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  config:
    import:
      - classpath:agent/drawio-fast.yml
      - classpath:agent/drawio-balanced.yml
      - classpath:agent/drawio-quality.yml
      - classpath:agent/drawio-stable.yml
      - classpath:agent/drawio-degrade.yml
  datasource:
    username: root
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://127.0.0.1:13306/agenx_drawio?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  hikari:
    pool-name: Retail_HikariCP
    minimum-idle: 15 #最小空闲连接数量
    idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
    maximum-pool-size: 25 #连接池最大连接数，默认是10
    auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
    max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
    connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
    connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
#      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
  type: com.zaxxer.hikari.HikariDataSource

# MyBatis 配置【如需使用记得打开】
#mybatis:
#  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location:  classpath:/mybatis/config/mybatis-config.xml

# 日志
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location: classpath:/mybatis/config/mybatis-config.xml

logging:
  level:
    root: info
  config: classpath:logback-spring.xml

management:
  server:
    port: ${PROMETHEUS_PORT:9091}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

agent:
  plugin:
    observability:
      enabled: true
    governance:
      enabled: true
      global-rate-limit-per-second: 50
      user-rate-limit-per-second: 5
      global-concurrency-limit: 20
      user-concurrency-limit: 3
      default-user-quota-per-day: 1000
      redis-prefix: governance
      concurrency-lease-seconds: 300
      blacklist-cache-seconds: 30
      blacklist: []
      breaker:
        enabled: false
        failure-threshold: 5
        open-seconds: 60
    privacy:
      enabled: true
      mask-phone: true
      mask-id-card: true
      mask-token: true
      replace-text: "***"
    sensitive-word:
      enabled: true
      mode: reject
      replace-text: "***"
      normalize-enabled: true
      word-list: ["八嘎","我靠"]
      whitelist: []
      hot-reload-enabled: false
