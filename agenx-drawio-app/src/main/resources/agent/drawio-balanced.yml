ai:
  agent:
    config:
      tables:
        balanced:
          app-name: balanced
          root-agent:
            root-agent-id: balanced
            root-agent-name: Balanced Draw.io Agent
            root-agent-desc: Balanced two-agent mode that analyzes the diagram first and then renders XML.
          runtime:
            ai-api:
              base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
              api-key: ${AI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH:chat/completions}
            chat-model:
              model: ${AI_MODEL:glm-4.7}
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: ${BAIDU_SEARCH_BASE_URI:http://appbuilder.baidu.com/v2/ai_search/mcp/}
                    sse-endpoint: sse?api_key=${BAIDU_SEARCH_API_KEY:}
                    request-timeout: 5
            agents:
              - name: DiagramStructureAgent
                description: Analyzes the request and defines the diagram structure.
                instruction: |
                  You are a draw.io diagram structure analyst.

                  Convert the user's request into a precise blueprint for a draw.io diagram.
                  Use the Baidu search MCP only when the request depends on external facts such as vendor capabilities, current product names, cloud services, standards, or network information.
                  Do not call search for common business workflows, generic architecture diagrams, or ordinary process charts.

                  Output plain text only with these sections:
                  DIAGRAM_TYPE:
                  PAGE_SIZE:
                  LAYOUT_DIRECTION:
                  CONTAINERS:
                  NODES:
                  EDGES:
                  STYLE_GUIDELINES:
                  ASSUMPTIONS:

                  Requirements:
                  - Be concrete enough that another agent can render draw.io XML without asking questions.
                  - Include node ids, labels, types, parent-child relationships, and approximate coordinates or clear relative placement.
                  - Keep the structure readable and import-friendly.
                  - Prefer a conservative structure over speculative complexity.
                output-key: diagram_blueprint
              - name: DiagramXmlAgent
                description: Renders draw.io XML strictly from the diagram blueprint.
                instruction: |
                  You are a draw.io XML renderer.

                  Render valid draw.io XML from this blueprint:
                  {diagram_blueprint}

                  Do not use the Baidu search MCP unless the blueprint still clearly depends on missing external facts. In most cases you should not search again.

                  Hard requirements:
                  1. The entire response must be XML only. Do not output explanations, comments, or markdown fences.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. Include at least one <diagram> with <mxGraphModel>.
                  4. Include <mxCell id="0"/> and <mxCell id="1" parent="0"/>.
                  5. Use the blueprint directly and do not invent a different structure.
                  6. Every node must be an <mxCell> with vertex="1" and a matching <mxGeometry ... as="geometry"/>.
                  7. Every edge must be an <mxCell> with edge="1", source, target, and a matching <mxGeometry relative="1" as="geometry"/>.
                  8. Use clear spacing and standard draw.io styles.
                  9. If the blueprint is incomplete, fill only the minimum missing details needed to produce valid XML.

                  Final rule:
                  The entire response must be valid XML only.
                output-key: drawio_xml
            agent-workflows:
              - type: sequential
                name: DrawioDualWorkflow
                description: Analyze first, then render XML.
                sub-agents:
                  - DiagramStructureAgent
                  - DiagramXmlAgent
            runner:
              agent-name: DrawioDualWorkflow
