ai:
  agent:
    config:
      tables:
        quality:
          app-name: quality
          root-agent:
            root-agent-id: quality
            root-agent-name: Quality Draw.io Agent
            root-agent-desc: High-quality three-agent mode that generates, reviews, and revises draw.io XML.
          runtime:
            ai-api:
              base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
              api-key: ${AI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH:chat/completions}
            chat-model:
              model: ${AI_MODEL:glm-4.7}
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: ${BAIDU_SEARCH_BASE_URI:http://appbuilder.baidu.com/v2/ai_search/mcp/}
                    sse-endpoint: sse?api_key=${BAIDU_SEARCH_API_KEY:}
                    request-timeout: 5
              tool-skill-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: InitialXmlGeneratorAgent
                description: Generates the first draw.io XML draft.
                instruction: |
                  You are the initial draw.io XML generator.

                  Read the user's request and produce the first importable draw.io XML draft.
                  Before generating XML, identify the most likely diagram type and use the best matching draw.io skill.
                  If the user explicitly asks for a flowchart, sequence diagram, use case diagram, or PRD-based diagram, you must follow the matching skill first.
                  If the user does not specify the diagram type, infer it from the request and prefer the most relevant specialized skill.
                  If the request cannot be classified with high confidence, fall back to the generic drawio-xml-designer skill.
                  Use the Baidu search MCP only when the request depends on external facts such as vendor capabilities, current product names, cloud services, standards, or network information.
                  Do not call search for common business workflows, generic architecture diagrams, or ordinary process charts.

                  Hard requirements:
                  1. The entire response must be XML only. Do not output explanations or markdown fences.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. The XML must be importable by draw.io and include all required root cells and geometry.
                  4. Every visible node must be an <mxCell> with vertex="1" and geometry.
                  5. Every connector must be an <mxCell> with edge="1", source, target, and geometry.
                  6. Prefer a readable, complete structure.
                  7. Keep the main flow visually clear and minimize node overlaps, edge overlaps, and line crossings.
                  8. Keep same-type logical nodes visually consistent across shapes and colors.
                  9. Use this default semantic style mapping unless the user requests another convention:
                     start/end = green ellipse
                     process = blue rounded rectangle
                     decision = yellow diamond
                     data store = purple or slate cylinder
                     note = light neutral note
                     container = light neutral container
                  10. Sequence diagrams must preserve participant order and message order instead of collapsing into a flowchart.
                  11. Use case diagrams must keep actors outside the system boundary and use cases inside it.
                  12. PRD-based requests must extract roles, goals, modules, flows, and dependencies before choosing the final structure.
                output-key: initial_drawio_xml
              - name: XmlReviewAgent
                description: Reviews the XML draft for structural and diagram quality issues.
                instruction: |
                  You are a draw.io XML reviewer.

                  Review the following XML draft:
                  {initial_drawio_xml}

                  Evaluate:
                  - XML structural validity
                  - Whether it is likely importable by draw.io
                  - Missing root cells, missing geometry, bad ids, missing source/target
                  - Layout readability and completeness against the user request
                  - Whether node alignment, spacing, and grouping keep the structure clear
                  - Whether edges are routed to minimize crossings and avoid obvious clutter
                  - Whether similar logical node types use consistent shapes and colors
                  - Whether the XML contains extra non-XML text or unstable style usage

                  Output plain text only using this format:
                  REVIEW_STATUS: PASS or REVISE
                  ISSUES:
                  - item
                  - item
                  FIX_PLAN:
                  - item

                  Rules:
                  - Every issue must be concrete and actionable.
                  - Do not rewrite the XML.
                  - Do not output praise-only reviews.

                  If the draft is already strong, use REVIEW_STATUS: PASS and keep the issue list minimal.
                output-key: xml_review_feedback
              - name: XmlRevisionAgent
                description: Revises the XML according to the review feedback and returns final XML.
                instruction: |
                  You are a draw.io XML revision agent.

                  Revise the following XML draft according to the review feedback and return the improved final draw.io XML.

                  Original XML draft:
                  {initial_drawio_xml}

                  Review feedback:
                  {xml_review_feedback}

                  Hard requirements:
                  1. The entire response must be XML only. Do not output explanations or markdown fences.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. Keep the result importable by draw.io.
                  4. Preserve useful parts of the original draft while fixing the issues named in the review.
                  5. Include all required cells, ids, source/target links, and geometry.
                  6. Fix the review issues directly rather than producing a fresh unrelated layout.
                  7. Improve readability by reducing crossings, overlaps, and inconsistent spacing where possible.
                  8. Normalize same-type nodes to a consistent semantic style mapping unless the original request says otherwise.
                output-key: final_drawio_xml
            agent-workflows:
              - type: sequential
                name: DrawioReviewWorkflow
                description: Generate XML, review it, and revise it once.
                sub-agents:
                  - InitialXmlGeneratorAgent
                  - XmlReviewAgent
                  - XmlRevisionAgent
            runner:
              agent-name: DrawioReviewWorkflow
              plugin-name-list:
                - privacyPlugin
                - governancePlugin
                - observabilityPlugin
                - costAccountingPlugin
