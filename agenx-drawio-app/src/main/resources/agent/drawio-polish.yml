ai:
  agent:
    config:
      tables:
        polish:
          app-name: polish
          root-agent:
            root-agent-id: polish
            root-agent-name: Polish Draw.io Agent
            root-agent-desc: Generates XML, reviews layout quality in text, and revises once.
          runtime:
            ai-api:
              base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
              api-key: ${AI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH:chat/completions}
              request-timeout: ${AI_REQUEST_TIMEOUT:600}
            chat-model:
              model: ${AI_MODEL:glm-4.7}
              tool-mcp-list:
                - local:
                    name: drawioXmlToolCallbackProvider
                - sse:
                    name: baidu-search
                    base-uri: ${BAIDU_SEARCH_BASE_URI:http://appbuilder.baidu.com/v2/ai_search/mcp/}
                    sse-endpoint: sse?api_key=${BAIDU_SEARCH_API_KEY:}
                    request-timeout: 5
              tool-skill-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: InitialXmlAgent
                description: Generates the first draw.io XML draft.
                instruction: |
                  You are the initial draw.io XML generator.

                  Read the user's request and produce the first importable draw.io XML draft.
                  Before generating XML, identify the most likely diagram type and use the best matching draw.io skill.
                  If the user explicitly asks for a flowchart, sequence diagram, use case diagram, or PRD-based diagram, you must follow the matching skill first.
                  If the user does not specify the diagram type, infer it from the request and prefer the most relevant specialized skill.
                  If the request cannot be classified with high confidence, fall back to the generic drawio-xml-designer skill.
                  Use the Baidu search MCP only when the request depends on external facts such as vendor capabilities, current product names, cloud services, standards, or network information.

                  Hard requirements:
                  1. The entire response must be XML only.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. The XML must be importable by draw.io and include all required root cells and geometry.
                  4. Every visible node must be an <mxCell> with vertex="1" and geometry.
                  5. Every connector must be an <mxCell> with edge="1", source, target, and geometry.
                  6. Prefer a readable, complete structure.
                  7. Avoid obvious container collisions and gross edge clutter, but do not over-iterate.
                  8. For use case diagrams, render relation labels as <<include>> and <<extend>>.
                output-key: initial_drawio_xml
              - name: LayoutReviewAgent
                description: Reviews the XML draft and outputs layout issues plus a fix plan.
                instruction: |
                  You are a draw.io XML layout reviewer.

                  Review the following XML draft:
                  {initial_drawio_xml}

                  First call analyzeDrawioXml exactly once with:
                  - xml = the full XML draft
                  - profile = polish

                  Use the tool result as the primary evidence for your review. Keep the review conservative. Do not invent extra layout issues that are not clearly supported by the tool output or obvious from the XML.

                  Evaluate:
                  - XML structural validity
                  - Container overlap or missing container padding
                  - Edge overlap or co-linear routing risks
                  - Reading direction and spacing clarity
                  - Node and edge style consistency

                  Output plain text only using this format:
                  REVIEW_STATUS: PASS or REVISE
                  ISSUES:
                  - item
                  FIX_PLAN:
                  - item

                  Rules:
                  - analyzeDrawioXml must be called exactly once before you write the review.
                  - Do not rewrite the XML.
                  - Every issue must be concrete and actionable.
                  - If the tool report is PASS, prefer REVIEW_STATUS: PASS unless there is an obvious severe issue.
                  - Keep the review concise and execution-oriented.
                output-key: layout_review_feedback
              - name: XmlPolishAgent
                description: Revises the XML once according to the review feedback and returns final XML.
                instruction: |
                  You are a draw.io XML polish agent.

                  Revise the following XML draft according to the review feedback and return the improved final draw.io XML.

                  Original XML draft:
                  {initial_drawio_xml}

                  Review feedback:
                  {layout_review_feedback}

                  Before revising, call analyzeDrawioXml exactly once with:
                  - xml = the original XML draft
                  - profile = polish

                  Use the tool report to anchor the revision scope. Do not over-correct low-confidence layout issues.

                  Hard requirements:
                  1. The entire response must be XML only.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. Keep the result importable by draw.io.
                  4. Preserve useful parts of the original draft while fixing the issues named in the review.
                  5. Include all required cells, ids, source/target links, and geometry.
                  6. Fix the review issues directly rather than producing a fresh unrelated layout.
                  7. Perform exactly one revision pass. Do not simulate further review loops.
                  8. Do not widen the revision scope beyond the tool report and review feedback.
                output-key: polished_drawio_xml
            agent-workflows:
              - type: sequential
                name: DrawioPolishWorkflow
                description: Generate XML, review it, and revise it once.
                sub-agents:
                  - InitialXmlAgent
                  - LayoutReviewAgent
                  - XmlPolishAgent
            runner:
              agent-name: DrawioPolishWorkflow
              plugin-name-list:
                - privacyPlugin
                - sensitiveWordPlugin
                - governancePlugin
                - drawioXmlFormatGuardPlugin
                - observabilityPlugin
