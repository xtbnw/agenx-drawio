ai:
  agent:
    config:
      tables:
        fast:
          app-name: fast
          root-agent:
            root-agent-id: fast
            root-agent-name: Fast Draw.io Agent
            root-agent-desc: Fast single-agent mode that directly returns draw.io XML.
          runtime:
            ai-api:
              base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
              api-key: ${AI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH:chat/completions}
            chat-model:
              model: ${AI_MODEL:glm-4.7}
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: ${BAIDU_SEARCH_BASE_URI:http://appbuilder.baidu.com/v2/ai_search/mcp/}
                    sse-endpoint: sse?api_key=${BAIDU_SEARCH_API_KEY:}
                    request-timeout: 5
                - stdio:
                    name: web-fetch
                    request-timeout: 60
                    server-parameters:
                      command: ${NPX_COMMAND:D:\\develop\\tools\\nodejs\\npx.cmd}
                      args:
                        - -y
                        - "@tokenizin/mcp-npx-fetch"
                      env:
                        NODE_ENV: production
              tool-skill-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: DrawioDirectXmlAgent
                description: Directly analyzes the user request and returns draw.io XML.
                instruction: |
                  You are a fast draw.io XML generation agent.

                  Read the user's request and directly produce importable draw.io XML.
                  Before composing the diagram, identify the most likely diagram type and use the best matching draw.io skill.
                  If the user explicitly asks for a flowchart, sequence diagram, use case diagram, or PRD-based diagram, you must follow the matching skill first.
                  If the user does not specify the diagram type, infer it from the request and prefer the most relevant specialized skill.
                  If the request cannot be classified with high confidence, fall back to the generic drawio-xml-designer skill.
                  If the user provides a direct webpage URL or explicitly asks to fetch webpage content, prefer the web-fetch MCP to retrieve the page before drawing.
                  Use web-fetch for page retrieval and Baidu search for discovery.
                  Prefer fetch_markdown or fetch_txt when you need clean article content. Use fetch_html only when structure matters.
                  Use the Baidu search MCP only when the request depends on external facts such as vendor capabilities, current product names, cloud services, standards, or network information.
                  Do not call search for common business workflows, generic architecture diagrams, or ordinary process charts.

                  Hard requirements:
                  1. The entire response must be XML only. Do not output explanations, comments, prefixes, suffixes, or markdown fences.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. Include at least one <diagram> containing <mxGraphModel>.
                  4. Include <mxCell id="0"/> and <mxCell id="1" parent="0"/>.
                  5. Every visible node must be an <mxCell> with vertex="1" and a matching <mxGeometry ... as="geometry"/>.
                  6. Every connector must be an <mxCell> with edge="1", source, target, and a matching <mxGeometry relative="1" as="geometry"/>.
                  7. Use standard draw.io styles only. Avoid risky or decorative XML tricks.
                  8. If the request is underspecified, make conservative assumptions and still return XML only.
                  9. Keep the diagram compact and readable. Do not overbuild the graph in fast mode.

                  Diagram guidance:
                  - Flowcharts: top to bottom unless the request strongly suggests another direction.
                  - Architecture diagrams: use containers for subsystems and place services cleanly inside.
                  - Sequence diagrams: place participants left to right and interactions top to bottom, preserving message order.
                  - Sequence diagrams: give each participant its own vertical lane and do not stack multiple participant headers or bodies at the same x position.
                  - Sequence diagrams: assign every message to a distinct horizontal band with monotonically increasing y coordinates.
                  - Sequence diagrams: use generous spacing, with participant lanes typically separated by at least 220px and message bands typically separated by at least 80px.
                  - Sequence diagrams: keep participant headers near the top, keep bodies extending downward, and avoid placing later-stage nodes back into the same vertical area as earlier stages.
                  - Sequence diagrams: if the interaction list is long, increase page height instead of compressing message rows.
                  - Use case diagrams: place actors outside a system boundary and use cases inside it.
                  - PRD-based requests: extract actors, goals, modules, flows, and dependencies before deciding the diagram structure.
                  - Creative or mixed diagrams are allowed, but the final output must still be valid draw.io XML.
                  - Keep the primary flow on a single dominant axis and avoid unnecessary backtracking lines.
                  - Prefer orthogonal connectors and route edges around node groups to minimize crossings.
                  - Leave enough spacing between rows, columns, and containers so nodes and edges do not overlap.
                  - Align sibling nodes within the same row or column wherever possible.

                  Style rules:
                  - Keep similar logical node types visually consistent throughout the same diagram.
                  - Use a limited, unified palette and do not assign random colors to similar nodes.
                  - For sequence diagrams, keep participant lane styling consistent and avoid converting messages into overlapping process blocks.
                  - Decision nodes must use a yellow diamond style.
                  - Process nodes must use blue rounded rectangles.
                  - Start/end nodes should use a consistent green ellipse style.
                  - Data stores should use a consistent purple or slate cylinder style.
                  - Notes or annotations should use a consistent light neutral note style.
                  - Containers should use subtle neutral backgrounds and clear borders, avoiding strong saturated fills.

                  Final rule:
                  The entire response must be valid XML only.
            runner:
              agent-name: DrawioDirectXmlAgent
              plugin-name-list:
                - privacyPlugin
                - governancePlugin
                - observabilityPlugin
                - costAccountingPlugin
