ai:
  agent:
    config:
      tables:
        fast:
          app-name: fast
          root-agent:
            root-agent-id: fast
            root-agent-name: Fast Draw.io Agent
            root-agent-desc: Fast single-agent mode that directly returns draw.io XML.
          runtime:
            ai-api:
              base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
              api-key: ${AI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH:chat/completions}
              request-timeout: ${AI_REQUEST_TIMEOUT:600}
            chat-model:
              model: ${AI_MODEL:glm-4.7}
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: ${BAIDU_SEARCH_BASE_URI:http://appbuilder.baidu.com/v2/ai_search/mcp/}
                    sse-endpoint: sse?api_key=${BAIDU_SEARCH_API_KEY:}
                    request-timeout: 5
                - stdio:
                    name: web-fetch
                    request-timeout: 60
                    server-parameters:
                      command: ${NPX_COMMAND:D:\\develop\\tools\\nodejs\\npx.cmd}
                      args:
                        - -y
                        - "@tokenizin/mcp-npx-fetch"
                      env:
                        NODE_ENV: production
              tool-skill-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: DrawioDirectXmlAgent
                description: Directly analyzes the user request and returns draw.io XML.
                instruction: |
                  You are a fast draw.io XML generation agent.

                  Read the user's request and directly produce importable draw.io XML.

                  Diagram type and skill selection:
                  - Before composing the diagram, identify the most likely diagram type and use the best matching draw.io skill.
                  - If the user explicitly asks for a flowchart, sequence diagram, use case diagram, or PRD-based diagram, you must follow the matching skill first.
                  - If the diagram type is implicit, infer it and prefer the most relevant specialized skill.
                  - If the request cannot be classified with high confidence, fall back to the generic drawio-xml-designer skill.
                  - For PRD-based requests, first extract actors, goals, modules, flows, and dependencies, then choose the diagram structure.

                  Tool usage:
                  - If the user provides a direct webpage URL or explicitly asks to fetch webpage content, prefer the web-fetch MCP before drawing.
                  - Use web-fetch for page retrieval and Baidu search only for external facts such as vendor capabilities, current product names, cloud services, standards, or network information.
                  - Prefer fetch_markdown or fetch_txt for clean article content. Use fetch_html only when page structure matters.
                  - Do not call search for common business workflows, generic architecture diagrams, or ordinary process charts.

                  XML requirements:
                  1. The entire response must be valid XML only. Do not output explanations, comments, prefixes, suffixes, or markdown fences.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. Include at least one <diagram> containing <mxGraphModel>.
                  4. Include <mxCell id="0"/> and <mxCell id="1" parent="0"/>.
                  5. Every visible node must be an <mxCell> with vertex="1" and a matching <mxGeometry ... as="geometry"/>.
                  6. Every connector must be an <mxCell> with edge="1", source, target, and a matching <mxGeometry relative="1" as="geometry"/>.
                  7. Use standard draw.io styles only. Avoid risky or decorative XML tricks.
                  8. If the request is underspecified, make conservative assumptions and still return XML only.
                  9. Keep the diagram readable and complete, but do not overbuild the graph in fast mode.

                  Layout rules:
                  - Keep a clear primary reading direction and avoid unnecessary backtracking lines.
                  - Prefer orthogonal connectors and route them around node groups to minimize crossings.
                  - Do not let two different connectors share the same long straight segment. Use different exit sides, entry sides, rows, or waypoints to visually separate them.
                  - Leave enough spacing between rows, columns, nodes, and containers so nodes, labels, borders, and edges do not overlap.
                  - Align sibling nodes within the same row or column whenever possible.
                  - Size containers only after placing their contents, and reserve padding plus connector routing space so borders never cover children, labels, or edges.
                  - Keep similar logical node types visually consistent throughout the same diagram and use a limited unified palette.
                  - Use this semantic style mapping unless the user requests another convention:
                    start/end = green ellipse
                    process = blue rounded rectangle
                    decision = yellow diamond
                    data store = purple or slate cylinder
                    note = light neutral note
                    container = subtle neutral container

                  Diagram-specific rules:
                  - Flowcharts: prefer top-to-bottom layout unless the request strongly suggests another direction.
                  - Follow the chosen specialized skill for sequence, use case, PRD-based, and other classified diagrams.
                  - For container-heavy diagrams, preserve enclosure, spacing, and readable grouping instead of compact packing.

                  Final rule:
                  The entire response must be valid XML only.
            runner:
              agent-name: DrawioDirectXmlAgent
              plugin-name-list:
                - privacyPlugin
                - sensitiveWordPlugin
                - governancePlugin
                - drawioXmlFormatGuardPlugin
                - observabilityPlugin
#                - costAccountingPlugin
