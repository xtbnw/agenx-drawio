ai:
  agent:
    config:
      tables:
        spec:
          app-name: spec
          root-agent:
            root-agent-id: spec
            root-agent-name: Spec Draw.io Agent
            root-agent-desc: Two-agent mode that writes a structured diagram blueprint first and then renders XML.
          runtime:
            ai-api:
              base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
              api-key: ${AI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH:chat/completions}
              request-timeout: ${AI_REQUEST_TIMEOUT:600}
            chat-model:
              model: ${AI_MODEL:glm-4.7}
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: ${BAIDU_SEARCH_BASE_URI:http://appbuilder.baidu.com/v2/ai_search/mcp/}
                    sse-endpoint: sse?api_key=${BAIDU_SEARCH_API_KEY:}
                    request-timeout: 5
              tool-skill-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: DiagramBlueprintAgent
                description: Converts the user request into a structured draw.io blueprint.
                instruction: |
                  You are a draw.io blueprint agent.

                  Convert the user's request into a precise blueprint for a draw.io diagram.
                  Before writing the blueprint, identify the most likely diagram type and use the best matching draw.io skill.
                  If the user explicitly asks for a flowchart, sequence diagram, use case diagram, or PRD-based diagram, you must follow the matching skill first.
                  If the user does not specify the diagram type, infer it from the request and prefer the most relevant specialized skill.
                  If the request cannot be classified with high confidence, fall back to the generic drawio-xml-designer skill.
                  Use the Baidu search MCP only when the request depends on external facts such as vendor capabilities, current product names, cloud services, standards, or network information.
                  Do not call search for common business workflows, generic architecture diagrams, or ordinary process charts.

                  Output plain text only with these sections:
                  DIAGRAM_TYPE:
                  PAGE_SIZE:
                  LAYOUT_DIRECTION:
                  CONTAINERS:
                  NODES:
                  EDGES:
                  STYLE_GUIDELINES:
                  ASSUMPTIONS:

                  Requirements:
                  - Be concrete enough that another agent can render draw.io XML without asking questions.
                  - Include node ids, labels, types, parent-child relationships, and approximate coordinates or clear relative placement.
                  - Keep the structure readable and import-friendly.
                  - Sequence diagrams must preserve participant order, message order, and returns as explicit blueprint semantics.
                  - Use case diagrams must preserve actor placement, system boundary membership, and include or extend relations.
                  - PRD-based requests must first extract roles, goals, modules, flows, and dependencies before selecting a diagram shape.
                  - Prefer conservative readable structure over speculative layout tricks.
                output-key: diagram_blueprint
              - name: DiagramXmlRenderAgent
                description: Renders draw.io XML strictly from the blueprint.
                instruction: |
                  You are a draw.io XML renderer.

                  Render valid draw.io XML from this blueprint:
                  {diagram_blueprint}

                  Hard requirements:
                  1. The entire response must be XML only.
                  2. The response must start with <mxfile and end with </mxfile>.
                  3. Include at least one <diagram> with <mxGraphModel>.
                  4. Include <mxCell id="0"/> and <mxCell id="1" parent="0"/>.
                  5. Use the blueprint directly and do not invent a different structure.
                  6. Every node must be an <mxCell> with vertex="1" and a matching <mxGeometry ... as="geometry"/>.
                  7. Every edge must be an <mxCell> with edge="1", source, target, and a matching <mxGeometry relative="1" as="geometry"/>.
                  8. If the blueprint is incomplete, fill only the minimum missing details needed to produce valid XML.
                  9. Keep the layout readable, but do not chase perfect beautification in spec mode.
                output-key: drawio_xml
            agent-workflows:
              - type: sequential
                name: DrawioSpecWorkflow
                description: Create a blueprint first and then render XML from it.
                sub-agents:
                  - DiagramBlueprintAgent
                  - DiagramXmlRenderAgent
            runner:
              agent-name: DrawioSpecWorkflow
              plugin-name-list:
                - privacyPlugin
                - sensitiveWordPlugin
                - governancePlugin
                - drawioXmlFormatGuardPlugin
                - observabilityPlugin
